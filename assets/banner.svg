<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0c0a"/>
      <stop offset="50%" style="stop-color:#1a1208"/>
      <stop offset="100%" style="stop-color:#0d0c0a"/>
    </linearGradient>
    <linearGradient id="orangeTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9900"/>
      <stop offset="50%" style="stop-color:#FFB84D"/>
      <stop offset="100%" style="stop-color:#00C7B1"/>
    </linearGradient>
    <linearGradient id="tealOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C7B1"/>
      <stop offset="100%" style="stop-color:#FF9900"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#FF9900" stroke-width="0.2" stroke-dasharray="4,8" opacity="0.15"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#FF9900" stroke-width="0.2" stroke-dasharray="4,8" opacity="0.15"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#FF9900" stroke-width="0.2" stroke-dasharray="4,8" opacity="0.15"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#FF9900" stroke-width="0.2" stroke-dasharray="4,8" opacity="0.15"/>

  <!-- Pipeline connector line -->
  <line x1="90" y1="148" x2="810" y2="148" stroke="url(#orangeTeal)" stroke-width="1.5" opacity="0.5"/>

  <!-- Service nodes -->
  <!-- IAM -->
  <circle cx="120" cy="148" r="26" fill="#1a1208" stroke="#FF9900" stroke-width="1.5" filter="url(#glow)"/>
  <text x="120" y="143" font-family="monospace" font-size="9" fill="#FF9900" text-anchor="middle" font-weight="bold">IAM</text>
  <text x="120" y="155" font-family="monospace" font-size="7" fill="#FFB84D" text-anchor="middle">Security</text>

  <!-- EC2 -->
  <circle cx="230" cy="148" r="26" fill="#1a1208" stroke="#FF9900" stroke-width="1.5" filter="url(#glow)"/>
  <text x="230" y="143" font-family="monospace" font-size="9" fill="#FF9900" text-anchor="middle" font-weight="bold">EC2</text>
  <text x="230" y="155" font-family="monospace" font-size="7" fill="#FFB84D" text-anchor="middle">Compute</text>

  <!-- VPC -->
  <circle cx="340" cy="148" r="26" fill="#1a1208" stroke="#FFB84D" stroke-width="1.5" filter="url(#glow)"/>
  <text x="340" y="143" font-family="monospace" font-size="9" fill="#FFB84D" text-anchor="middle" font-weight="bold">VPC</text>
  <text x="340" y="155" font-family="monospace" font-size="7" fill="#FF9900" text-anchor="middle">Network</text>

  <!-- S3 -->
  <circle cx="450" cy="148" r="26" fill="#1a1208" stroke="#00D4BD" stroke-width="1.5" filter="url(#glow)"/>
  <text x="450" y="143" font-family="monospace" font-size="9" fill="#00D4BD" text-anchor="middle" font-weight="bold">S3</text>
  <text x="450" y="155" font-family="monospace" font-size="7" fill="#00C7B1" text-anchor="middle">Storage</text>

  <!-- Lambda -->
  <circle cx="560" cy="148" r="26" fill="#1a1208" stroke="#00C7B1" stroke-width="1.5" filter="url(#glow)"/>
  <text x="560" y="143" font-family="monospace" font-size="9" fill="#00C7B1" text-anchor="middle" font-weight="bold">λ</text>
  <text x="560" y="155" font-family="monospace" font-size="7" fill="#00C7B1" text-anchor="middle">Serverless</text>

  <!-- RDS -->
  <circle cx="670" cy="148" r="26" fill="#1a1208" stroke="#00C7B1" stroke-width="1.5" filter="url(#glow)"/>
  <text x="670" y="143" font-family="monospace" font-size="9" fill="#00C7B1" text-anchor="middle" font-weight="bold">RDS</text>
  <text x="670" y="155" font-family="monospace" font-size="7" fill="#00C7B1" text-anchor="middle">Database</text>

  <!-- CloudWatch -->
  <circle cx="780" cy="148" r="26" fill="#1a1208" stroke="#FF9900" stroke-width="1.5" filter="url(#glow)"/>
  <text x="780" y="143" font-family="monospace" font-size="9" fill="#FF9900" text-anchor="middle" font-weight="bold">CW</text>
  <text x="780" y="155" font-family="monospace" font-size="7" fill="#FFB84D" text-anchor="middle">Monitor</text>

  <!-- Animated pulse on center node (S3) -->
  <circle cx="450" cy="148" r="26" fill="none" stroke="#00D4BD" stroke-width="1" opacity="0">
    <animate attributeName="r" values="26;38;26" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Main title -->
  <text x="450" y="52" font-family="monospace" font-size="32" font-weight="bold" fill="url(#orangeTeal)" text-anchor="middle" filter="url(#softglow)">AWS Complete Mastery</text>

  <!-- Subtitle -->
  <text x="450" y="80" font-family="monospace" font-size="13" fill="#FFB84D" text-anchor="middle" opacity="0.9">Cloud Infrastructure · Services · Architecture · Certification</text>

  <!-- Bottom accent line -->
  <line x1="50" y1="195" x2="850" y2="195" stroke="url(#orangeTeal)" stroke-width="2" opacity="0.6"/>
</svg>
